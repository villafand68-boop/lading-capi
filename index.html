<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOLDEN BLACK</title>

<script>
  // 1. CONFIGURACIÓN DE IDENTIDAD E ID (Inmediato)
  const PIXEL_ID = '790645863711552';
  function generateEventId() {
    return 'ev_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
  }
  const currentEventId = generateEventId();

  // 2. CARGA DEL PIXEL (Protegido para que no rompa el botón)
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=true;
  t.src=v;s=b.getElementsByTagName(e);
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');

  fbq('init', PIXEL_ID);
  fbq('track', 'PageView', {}, { eventID: currentEventId });
  fbq('track', 'ViewContent', {}, { eventID: currentEventId });
</script>

<style>
  body { margin:0; padding:0; background:url('imagen verde.png') no-repeat center center fixed; background-size:cover; font-family:Arial,sans-serif; text-align:center; color:white; background-color: #051a05; }
  .container { padding:50px 20px; }
  .logo{ width:280px; height:280px; background:url('logo_golden_black.png') no-repeat center; background-size:cover; border-radius:50%; margin:40px auto 20px; box-shadow:0 0 25px rgba(255,215,0,.6); }
  .title { font-size:32px; font-weight:bold; margin:20px 0; }
  .subtitle { font-size:20px; color:#FFA500; margin-bottom:25px; }
  .zona-ingreso-v9 { background:rgba(0,0,0,.6); padding:25px; border-radius:10px; max-width:420px; margin:0 auto; }
  input { width:100%; box-sizing:border-box; padding:15px; font-size:18px; border-radius:6px; border:none; margin-bottom:15px; outline: none; color: #000; }
  .disparador-accion-x8 {
    display:block; width:100%; padding:18px; background-color:#25D366; color:white;
    font-size:22px; font-weight:bold; border-radius:8px; cursor:pointer; border: none;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0% { box-shadow:0 0 10px rgba(0,255,0,0.4); } 50% { box-shadow:0 0 25px rgba(0,255,0,0.8); } 100% { box-shadow:0 0 10px rgba(0,255,0,0.4); } }
  .active-users { margin-top:18px; font-size:16px; background:rgba(0,0,0,.6); display:inline-block; padding:8px 15px; border-radius:6px; }
  .green-dot { background:#00FF00; width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:8px; animation:blink 1s infinite; }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.5; } }
  #popup-container { position:fixed; bottom:20px; left:20px; width:300px; z-index:9999; }
  .popup { background:rgba(0,0,0,0.85); color:#fff; padding:12px; border-radius:8px; margin-bottom:10px; font-size:14px; border-left: 4px solid #25D366; text-align: left; }
</style>
</head>

<body>
<div class="container">
  <div class="logo"></div>
  <div class="title">🍀 UNITE A LOS MEJORES 🍀</div>
  <div class="subtitle">Ingresá tu nombre y empezá ahora</div>

  <div class="zona-ingreso-v9">
    <input type="text" id="nombre_usuario" placeholder="Tu nombre" autocomplete="off">
    <button type="button" id="btn-envio-camuflado" class="disparador-accion-x8">QUIERO CONTINUAR</button>
  </div>

  <div class="active-users">
    <span class="green-dot"></span> Usuarios activos: <span id="user-count">87.567</span>
  </div>
</div>

<div id="popup-container"></div>

<script>
  // --- LÓGICA DE POPUPS ---
  const winners = ["Laura M.","Pedro T.","Mariana L.","Carlos G.","Lucía F.","Martín P."];
  setInterval(() => {
    const container = document.getElementById("popup-container");
    if(!container) return;
    container.innerHTML = "";
    const popup = document.createElement("div");
    popup.className = "popup";
    const amount = Math.floor(Math.random() * 600000) + 50000;
    popup.innerHTML = `🏆 ${winners[Math.floor(Math.random()*winners.length)]} acaba de ganar $${amount.toLocaleString("es-AR")}`;
    container.appendChild(popup);
  }, 7000);

  // --- CONTADOR ---
  let count = 87567;
  setInterval(() => {
    count += Math.floor(Math.random() * 3);
    const el = document.getElementById("user-count");
    if(el) el.innerText = count.toLocaleString("es-AR");
  }, 4000);

  // --- LÓGICA DEL BOTÓN (Independiente) ---
  const btn = document.getElementById('btn-envio-camuflado');
  btn.onclick = function() {
    const nom = document.getElementById('nombre_usuario').value.trim();
    if (!nom) {
      document.getElementById('nombre_usuario').style.border = "2px solid red";
      return;
    }

    sessionStorage.setItem('wa_nombre', nom);
    sessionStorage.setItem('wa_event_id', currentEventId);

    // Intentamos disparar el pixel, pero si falla, igual seguimos
    try {
      if (typeof fbq !== 'undefined') {
        fbq('track', 'Lead', {}, { eventID: currentEventId });
      }
    } catch(e) { console.log(e); }

    btn.innerText = "CARGANDO...";
    btn.disabled = true;

    setTimeout(() => {
      window.location.href = 'go.html';
    }, 800);
  };
</script>
</body>
</html>
