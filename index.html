<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOLDEN BLACK</title>

<!-- META PIXEL CORREGIDO -->
<script>
  const PIXEL_ID = '790645863711552';

  function generateEventId() {
    return 'ev_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
  }

  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=true;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');

  fbq('set', 'autoConfig', false, PIXEL_ID);
  fbq('init', PIXEL_ID);

  const pageEventId = generateEventId();

  fbq('track', 'PageView', {}, { eventID: pageEventId });
</script>

<style>
body {
  margin:0;
  padding:0;
  background:url('imagen verde.png') no-repeat center center fixed;
  background-size:cover;
  font-family:Arial,sans-serif;
  text-align:center;
  color:white;
  background-color:#051a05;
}

.container { padding:50px 20px; }

.logo{
  width:280px;
  height:280px;
  background:url('logo_golden_black.png') no-repeat center;
  background-size:cover;
  border-radius:50%;
  margin:40px auto 20px;
  box-shadow:0 0 25px rgba(255,215,0,.6);
}

.title { font-size:32px; font-weight:bold; margin:20px 0; }
.subtitle { font-size:20px; color:#FFA500; margin-bottom:25px; }

.zona-ingreso-v9 {
  background:rgba(0,0,0,.6);
  padding:25px;
  border-radius:10px;
  max-width:420px;
  margin:0 auto;
}

input {
  width:100%;
  padding:15px;
  font-size:18px;
  border-radius:6px;
  border:none;
  margin-bottom:15px;
}

.disparador-accion-x8 {
  width:100%;
  padding:18px;
  background-color:#25D366;
  color:white;
  font-size:22px;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(0,255,0,0.4);
}

footer {
  position:fixed;
  bottom:5px;
  width:100%;
  font-size:11px;
  color:#ccc;
}
</style>
</head>

<body>

<div class="container">
  <div class="logo"></div>

  <div class="title">🍀 UNITE A LOS MEJORES 🍀</div>
  <div class="subtitle">Ingresá tu nombre y empezá ahora</div>

  <div class="zona-ingreso-v9">
    <input type="text" id="nombre_usuario" placeholder="Tu nombre">
    <div id="btn-envio-camuflado" class="disparador-accion-x8">
      QUIERO CONTINUAR
    </div>
  </div>
</div>

<footer>Only for users aged 18+. No real money can be won.</footer>

<script>
const disparador = document.getElementById('btn-envio-camuflado');

disparador.addEventListener('pointerdown', function () {

  const nombreInput = document.getElementById('nombre_usuario');
  const nombreValue = nombreInput.value.trim();

  if (!nombreValue) {
    nombreInput.style.border = "2px solid red";
    return;
  }

  let eventId = sessionStorage.getItem('wa_event_id');

  if (!eventId) {
    eventId = generateEventId();
    sessionStorage.setItem('wa_event_id', eventId);
  }

  sessionStorage.setItem('wa_nombre', nombreValue);

  // 🔥 EVENTO LEAD (NAVEGADOR)
  fbq('track', 'Lead', {}, { eventID: eventId });

  // 👉 IR A GO (donde está el CAPI)
  window.location.href = 'go.html';
});
</script>

</body>
</html>
