<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOLDEN BLACK</title>

<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=true;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');

const PIXEL_ID = '790645863711552';
fbq('set', 'autoConfig', false, PIXEL_ID);
fbq('init', PIXEL_ID);
fbq('track', 'PageView');

function generateEventId() {
  return 'ev_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
}

function getCookie(name) {
  const match = document.cookie.match(new RegExp('(^|; )' + name + '=([^;]*)'));
  return match ? decodeURIComponent(match[2]) : '';
}
</script>

<style>
body { margin:0; padding:0; background:url('imagen verde.png') no-repeat center center fixed; background-size:cover; font-family:Arial,sans-serif; text-align:center; color:white; background-color: #051a05; }
.container { padding:50px 20px; }

.logo{ width:280px; height:280px; background:url('logo_golden_black.png') no-repeat center; background-size:cover; border-radius:50%; margin:40px auto 20px; box-shadow:0 0 25px rgba(255,215,0,.6); }
.title { font-size:32px; font-weight:bold; margin:20px 0; color: #fff; }
.subtitle { font-size:20px; color:#FFA500; margin-bottom:25px; }

.zona-ingreso-v9 { background:rgba(0,0,0,.6); padding:25px; border-radius:10px; max-width:420px; margin:0 auto; }

input { width:100%; box-sizing:border-box; padding:15px; font-size:18px; border-radius:6px; border:none; margin-bottom:15px; outline: none; }

.disparador-accion-x8 {
  display:inline-flex; align-items:center; justify-content:center;
  width:100%; padding:18px; background-color:#25D366; color:white;
  font-size:22px; font-weight:bold; border-radius:8px; cursor:pointer;
  box-shadow:0 0 20px rgba(0,255,0,0.4);
  animation: pulse 1.5s infinite; transition: transform 0.2s;
}

@keyframes pulse { 0% { box-shadow:0 0 10px rgba(0,255,0,0.4); } 50% { box-shadow:0 0 25px rgba(0,255,0,0.8); } 100% { box-shadow:0 0 10px rgba(0,255,0,0.4); } }

.active-users { margin-top:18px; font-size:16px; background:rgba(0,0,0,.6); display:inline-block; padding:8px 15px; border-radius:6px; }
.green-dot { background:#00FF00; width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:8px; animation:blink 1s infinite; }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.5; } }

footer { position:fixed; bottom:5px; width:100%; font-size:11px; color: #ccc; }
#popup-container { position:fixed; bottom:20px; left:20px; width:300px; z-index:9999; }
.popup { background:rgba(0,0,0,0.85); color:#fff; padding:12px; border-radius:8px; margin-bottom:10px; font-size:14px; display:flex; align-items:center; gap:10px; border-left: 4px solid #25D366; }
</style>
</head>

<body>
<div class="container">
  <div class="logo"></div>

  <div class="title">🍀 UNITE A LOS GANADORES 🍀</div>
  <div class="subtitle">Ingresá tu nombre y empezá ahora</div>

  <div class="zona-ingreso-v9">
    <input type="text" id="nombre_usuario" placeholder="Tu nombre" autocomplete="off">
    <div id="btn-envio-camuflado" class="disparador-accion-x8">
      QUIERO CONTINUAR
    </div>
  </div>

  <div class="active-users">
    <span class="green-dot"></span>
    Usuarios activos: <span id="user-count">87.567</span>
  </div>
</div>

<div id="popup-container"></div>
<footer>Only for users aged 18+. No real money can be won.</footer>

<script>
function generateEventId() {
  return 'ev_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
}

const disparador = document.getElementById('btn-envio-camuflado');

disparador.addEventListener('pointerdown', async function () {
  const nombreInput = document.getElementById('nombre_usuario');
  const nombreValue = nombreInput.value.trim();

  if (!nombreValue) {
    nombreInput.style.border = "2px solid red";
    return;
  }

  let eventId = sessionStorage.getItem('wa_event_id');
  if (!eventId) {
    eventId = generateEventId();
    sessionStorage.setItem('wa_event_id', eventId);
  }

  sessionStorage.setItem('wa_nombre', nombreValue);

  fbq('track', 'Lead', {}, { eventID: eventId });

  try {
    await fetch('/api/sendEvent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      keepalive: true,
      body: JSON.stringify({
        event_name: 'Lead',
        event_id: eventId,
        page_url: window.location.href,
        client_user_agent: navigator.userAgent
      })
    });
  } catch (e) {
    console.error(e);
  }

  window.location.href = 'go.html';
});

// POPUPS DE GANADORES
const winners = ["Laura M.","Pedro T.","Mariana L.","Carlos G.","Lucía F.","Martín P."];
let winnerIndex = 0;
function showPopup(){
  const container = document.getElementById("popup-container");
  container.innerHTML = "";
  const popup = document.createElement("div");
  popup.className = "popup";
  const amount = Math.floor(Math.random() * (700000 - 50000 + 1)) + 50000;
  popup.innerHTML = `🏆 ${winners[winnerIndex]} acaba de ganar $${amount.toLocaleString("es-AR")}`;
  container.appendChild(popup);
  winnerIndex = (winnerIndex + 1) % winners.length;
}
setInterval(showPopup, 6000);

// CONTADOR DINÁMICO
let userCount = 87567;
setInterval(() => {
  userCount += Math.floor(Math.random() * 3);
  document.getElementById("user-count").innerText = userCount.toLocaleString("es-AR");
}, 4000);
</script>

</body>
</html>
