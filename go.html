<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirigiendo...</title>
  <style>
    body { background-color: #051a05; color: white; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .loader { border: 4px solid rgba(255,255,255,0.1); border-left-color: #25D366; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"></div>

<script>
  // 1. Configuración de datos
  const numero = '5491161182461';
  const nombre = (sessionStorage.getItem('wa_nombre') || '').trim();
  const eventId = sessionStorage.getItem('wa_event_id');

  // 2. Función corregida para capturar cookies de Meta
  function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
    return null;
  }

  async function procesarYRedirigir() {
    // Si no hay datos, volvemos al inicio para evitar eventos vacíos
    if (!nombre || !eventId) {
      window.location.href = 'index.html';
      return;
    }

    try {
      // 3. Envío al Worker con timeout de seguridad
      const response = await fetch("https://api-meta.daniyons1996.workers.dev/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        keepalive: true, // Crucial: mantiene la petición viva si la página cambia
        body: JSON.stringify({
          event_id: eventId,
          event_name: "Lead",
          nombre: nombre,
          page_url: window.location.href,
          fbp: getCookie('_fbp'),
          fbc: getCookie('_fbc')
        })
      });

      const resultado = await response.json();
      console.log("Respuesta del servidor:", resultado);

    } catch (error) {
      console.error("Error crítico en el envío:", error);
    }

    // 4. Redirección final a WhatsApp
    const mensaje = `Hola, soy ${nombre} y quiero más información`;
    const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;

    // Esperamos 1.5 segundos para dar tiempo a la API de Meta a procesar
    setTimeout(() => {
      window.location.replace(url);
    }, 1500);
  }

  procesarYRedirigir();
</script>
</body>
</html>
