<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirigiendo...</title>
</head>
<body>
<script>
  const numero = '5491161182461';
  const nombre = (sessionStorage.getItem('wa_nombre') || '').trim();
  const eventId = sessionStorage.getItem('wa_event_id');

  if (!nombre) {
    window.location.href = 'index.html';
  } else {
    fetch("https://api-meta.daniyons1996.workers.dev/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        event_id: eventId,
        event_name: "Lead"
      })
    }).catch(console.error);

    const mensaje = `Hola, soy ${nombre} y quiero más información`;
    const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;

    setTimeout(() => {
      window.location.replace(url);
    }, 300);
  }
</script>
</body>
</html>
