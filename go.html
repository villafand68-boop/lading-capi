<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirigiendo...</title>
  <style>
    body {
      background-color: #051a05;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .loader {
      border: 4px solid rgba(255,255,255,0.1);
      border-left-color: #25D366;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader"></div>

<script>
  const numero = '5491161182461';
  const nombre = (sessionStorage.getItem('wa_nombre') || '').trim();
  const eventId = sessionStorage.getItem('wa_event_id');

  function getCookie(name) {
    const match = document.cookie.match(new RegExp('(^|; )' + name + '=([^;]*)'));
    return match ? decodeURIComponent(match[2]) : null;
  }

  async function procesarYRedirigir() {
    if (!nombre || !eventId) {
      window.location.href = 'index.html';
      return;
    }

    try {
      await fetch("https://api-meta.daniyons1996.workers.dev/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        keepalive: true,
        body: JSON.stringify({
          event_id: eventId,
          event_name: "Lead",
          nombre: nombre,
          page_url: window.location.href,
          client_user_agent: navigator.userAgent,
          fbp: getCookie('_fbp'),
          fbc: getCookie('_fbc')
        })
      });

      console.log("Evento de servidor enviado con éxito");
    } catch (error) {
      console.error("Error al contactar al Worker:", error);
    }

    const mensaje = `Hola, soy ${nombre} y quiero más información`;
    const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;

    setTimeout(() => {
      window.location.replace(url);
    }, 800);
  }

  procesarYRedirigir();
</script>
</body>
</html>
